[window]
opacity = 0.94
decorations = "full"
padding = { x = 12, y = 12 }
startup_mode = "Windowed"

[font]
size = 11.5

[font.normal]
family = "JetBrainsMono Nerd Font"

[cursor]
style = { shape = "Beam", blinking = "On" }

[terminal.shell]
program = "wsl.exe"
args = ["-d", "Ubuntu", "--cd", "~"]

[colors.primary]
background = "#16161D"
foreground = "#DCD7BA"

[colors.cursor]
text = "#181C23"
cursor = "#DCD7BA"

[colors.selection]
text = "#181C23"
background = "#54546D"

[colors.normal]
black = "#181C23"
red = "#E46876"
green = "#98BB6C"
yellow = "#FFA066"
blue = "#7E9CD8"
magenta = "#957FB8"
cyan = "#7AA89F"
white = "#DCD7BA"

[colors.bright]
black = "#54546D"
red = "#FF5D62"
green = "#A6D189"
yellow = "#E6C384"
blue = "#8BA4E8"
magenta = "#B692D6"
cyan = "#8EA4A2"
white = "#F2ECBC"